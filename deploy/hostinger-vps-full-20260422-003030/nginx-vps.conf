# Nginx para VPS - acesso por IP (177.67.32.204) e donassistec.com.br
# Frontend em :8201 | Backend em :3001
#
# Uso no servidor:
#   sudo cp nginx-vps.conf /etc/nginx/sites-available/donassistec
#   sudo ln -sf /etc/nginx/sites-available/donassistec /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # se existir e conflitar
#   sudo nginx -t && sudo systemctl reload nginx
#
# Firewall: liberar porta 80 (e 443 se usar HTTPS)
#   sudo ufw allow 80 && sudo ufw allow 443 && sudo ufw reload
#
# HTTPS: este arquivo só escuta na porta 80. Para 443 (SSL), use nginx-vps-ssl.conf.example
# e certbot. Veja TESTE-API-ACESSO.md.
#
# Após ativar: http://177.67.32.204/ e http://donassistec.com.br/ (quando DNS apontar)

server {
    listen 80;
    server_name 177.67.32.204 donassistec.com.br www.donassistec.com.br _;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # API -> backend :3001
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads (arquivos do backend) -> :3001
    location /uploads {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check do backend
    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        access_log off;
    }

    # Frontend (SPA) -> :8201 (serve dist ou Vite dev)
    # Se o upstream retornar 404 (ex: rota /apk), servir index.html para o React Router tratar
    location / {
        proxy_pass http://127.0.0.1:8200;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 = @spa;
        # HMR / WebSocket (Vite em dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # Fallback SPA: em 404, buscar index.html (/) do frontend
    location @spa {
        proxy_pass http://127.0.0.1:8200;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
