events {
    worker_connections 1024;
}

http {
    # Redirecionar HTTP para HTTPS
    server {
        listen 8083;
        server_name _;
        return 301 https://$host:8443$request_uri;
    }

    # Servidor HTTPS com SSL
    server {
        listen 8443 ssl;
        server_name _;

        # Configurações SSL
        ssl_certificate /home/DonAssistec/nginx-ssl.crt;
        ssl_certificate_key /home/DonAssistec/nginx-ssl.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Autenticação básica
        auth_basic "Acesso Restrito - phpMyAdmin";
        auth_basic_user_file /home/DonAssistec/nginx-phpmyadmin.htpasswd;

        location / {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}