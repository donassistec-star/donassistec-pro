version: '3.3'

services:
  mysql:
    image: mysql:5.7
    container_name: donassistec_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: donassistec_db
      MYSQL_USER: donassistec_user
      MYSQL_PASSWORD: donassistec_password
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - donassistec_network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: donassistec_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
      MYSQL_ROOT_PASSWORD: rootpassword
      # Configuração de servidor array para múltiplos servidores
      PMA_ARBITRARY: 0
      PMA_CONTROLHOST: mysql
      PMA_CONTROLPORT: 3306
    ports:
      - "0.0.0.0:8081:80"
    volumes:
      - ./phpmyadmin/sessions:/sessions
    depends_on:
      - mysql
    networks:
      - donassistec_network

volumes:
  mysql_data:
    driver: local

networks:
  donassistec_network:
    driver: bridge
